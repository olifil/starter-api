welcome:
  subject: "Welcome to {appName}"
  body: "<p>Hello {firstName}, welcome to {appName}!</p><p>Your account has been created successfully. To activate your account, please verify your email address.</p><p style=\"text-align: center; margin: 32px 0;\"><a href=\"{verificationLink}\" style=\"background-color: #3b82f6; color: #ffffff; padding: 12px 28px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 15px; display: inline-block;\">Verify</a></p>"
  sms: "Welcome {firstName} to {appName}!"
  push: "Welcome to {appName}!"

password-reset:
  subject: "Reset your password"
  body: "<p>Hello {firstName}, you requested a password reset.</p><p>This link expires in {expiresIn}.</p><p style=\"text-align: center; margin: 32px 0;\"><a href=\"{resetLink}\" style=\"background-color: #3b82f6; color: #ffffff; padding: 12px 28px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 15px; display: inline-block;\">Change my password</a></p>"
  sms: "Your reset code: {code}. Expires in {expiresIn}."
  push: "Password reset request received."

account-verified:
  subject: "Your account has been verified"
  body: "Hello {firstName}, your email address has been verified successfully. You can now access all features of {appName}."
  sms: "Your {appName} account is verified."
  push: "Your account has been verified successfully!"

generic:
  subject: "{subject}"
  body: "{message}"
  sms: "{message}"
  push: "{message}"

health-alert:
  subject: "[{appName}] System alert — {service} {statusLabel}"
  body: "Service <strong>{service}</strong> is <strong>{statusLabel}</strong>. Details: {details}. Time: {timestamp}"
  sms: "Alert {appName}: {service} is {statusLabel}. {details}"
  push: "{service} {statusLabel}"

layout:
  header:
    title: "{appName}"
  footer:
    rights: "© {year} {appName}. All rights reserved."
    disclaimer: "You are receiving this email because you are registered on {appName}."
